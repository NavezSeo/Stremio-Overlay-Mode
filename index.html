<!DOCTYPE html>
<html>
<head>
    <title>Stremio WorkMode Player</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; }
        video { width: 80%; border-radius: 8px; }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>
    <video id="videoPlayer" controls></video>
    <div class="controls">
        <button onclick="togglePiP()">Activar Modo Flotante (Always on Top)</button>
        <br><br>
        <label>Opacidad del Video:</label>
        <input type="range" min="0.1" max="1" step="0.1" value="1" onchange="adjustOpacity(this.value)">
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        
        async function togglePiP() {
            try {
                if (video !== document.pictureInPictureElement) {
                    await video.requestPictureInPicture();
                } else {
                    await document.exitPictureInPicture();
                }
            } catch (error) { console.error(error); }
        }

        function adjustOpacity(val) {
            video.style.opacity = val;
        }
    </script>
</body>
</html>
